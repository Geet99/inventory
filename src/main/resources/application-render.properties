# Render (and other cloud) deployment: use env vars for database.
# Set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD in Render dashboard.
# Defaults below avoid "URL must start with 'jdbc'" when env vars are not set (e.g. local run with render profile).

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:inventory_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator: expose liveness for Render health check (fast, no DB dependency)
management.endpoints.web.exposure.include=health
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
