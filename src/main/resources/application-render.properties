# Render (and other cloud) deployment: use env vars for database.
# Set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD in Render dashboard.
# Works with MySQL (e.g. PlanetScale, Railway) or PostgreSQL (e.g. Neon) - driver is inferred from URL.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
