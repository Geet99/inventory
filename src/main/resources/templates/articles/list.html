<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Articles Management - SKSE Inventory</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background-color: #f5f5f5; 
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px;
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { 
            color: #2c3e50; 
            margin-bottom: 10px; 
            font-size: 28px;
        }
        .header p { 
            color: #7f8c8d; 
            font-size: 16px; 
            margin: 0;
        }
        .nav {
            background: white;
            padding: 15px 0;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            color: #2c3e50;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 14px;
        }
        .nav a:hover {
            background-color: #ecf0f1;
            transform: translateY(-1px);
        }
        .nav a.active {
            background-color: #3498db;
            color: white;
        }
        .page-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .page-header h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
        }
        .btn { 
            padding: 10px 20px; 
            text-decoration: none; 
            border-radius: 5px; 
            margin: 5px; 
            display: inline-block; 
            font-weight: bold;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { 
            background-color: #007bff; 
            color: white; 
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-success { 
            background-color: #28a745; 
            color: white; 
        }
        .btn-success:hover {
            background-color: #1e7e34;
        }
        .btn-warning { 
            background-color: #ffc107; 
            color: black; 
        }
        .btn-warning:hover {
            background-color: #e0a800;
        }
        .btn-danger { 
            background-color: #dc3545; 
            color: white; 
        }
        .btn-danger:hover {
            background-color: #c82333;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #ddd; 
        }
        th { 
            background-color: #f8f9fa; 
            font-weight: bold; 
            color: #2c3e50;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .actions { 
            display: flex; 
            gap: 5px; 
            flex-wrap: wrap; 
        }
        .error { 
            color: red; 
            margin: 10px 0; 
        }
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: center;
            }
            .page-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
    <th:block th:replace="~{fragments/navigation :: common-styles}"></th:block>
</head>
<body>
    <!-- Include Page Header and Navigation -->
    <div th:replace="~{fragments/navigation :: page-header}"></div>
    <div th:replace="~{fragments/navigation :: navbar}"></div>
    
    <div class="container">
        <div class="page-header">
            <h2>Articles Management</h2>
            <div>
                <a th:href="@{/articles/new}" class="btn btn-success">➕ Add New Article</a>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <input type="text" id="articleSearchInput" th:value="${searchQuery}" placeholder="🔍 Search by article name or description..."
                   style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; width: 300px; font-size: 14px; box-sizing: border-box;">
        </div>
        
        <div th:if="${param.error}" class="error" th:text="${param.error}"></div>
        
        <table id="articlesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Cutting Cost</th>
                        <th>Printing Cost</th>
                        <th>Stitching Cost</th>
                        <th>Selling Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="article : ${articles}" th:attr="data-search=${article.name + ' ' + (article.description != null ? article.description : '')}">
                        <td th:text="${article.id}"></td>
                        <td th:text="${article.name}"></td>
                        <td th:text="${article.description}"></td>
                        <td th:text="${'₹' + article.cuttingCost}"></td>
                        <td th:text="${'₹' + article.printingCost}"></td>
                        <td th:text="${'₹' + article.stitchingCost}"></td>
                        <td th:text="${'₹' + article.slipperCost}"></td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/articles/edit/{id}(id=${article.id})}" class="btn btn-warning">Edit</a>
                                <form th:action="@{/articles/delete/{id}(id=${article.id})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-danger" 
                                            onclick="return confirm('Are you sure you want to delete this article?')">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(articles)}" style="text-align: center; margin-top: 50px; color: #666;">
            <p>No articles found. <a th:href="@{/articles/new}">Add your first article</a></p>
        </div>
    </div>
    <script>
        (function() {
            var input = document.getElementById('articleSearchInput');
            var table = document.getElementById('articlesTable');
            if (!input || !table) return;
            var tbody = table.querySelector('tbody');
            var dataRows = tbody ? tbody.querySelectorAll('tr[data-search]') : [];

            function applyFilter() {
                var q = (input.value || '').trim().toLowerCase();
                var visibleCount = 0;
                for (var i = 0; i < dataRows.length; i++) {
                    var row = dataRows[i];
                    var searchText = (row.getAttribute('data-search') || '').toLowerCase();
                    var show = !q || searchText.indexOf(q) !== -1;
                    row.style.display = show ? '' : 'none';
                    if (show) visibleCount++;
                }
                var existingNoResults = tbody.querySelector('tr.article-no-results');
                if (existingNoResults) existingNoResults.remove();
                if (visibleCount === 0 && q) {
                    var tr = document.createElement('tr');
                    tr.className = 'article-no-results';
                    var td = document.createElement('td');
                    td.colSpan = 8;
                    td.style.textAlign = 'center';
                    td.style.padding = '40px';
                    td.style.color = '#7f8c8d';
                    td.textContent = 'No articles found matching "' + q + '"';
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                }
            }
            input.addEventListener('input', applyFilter);
            if (input.value) applyFilter();
        })();
    </script>
</body>
</html>
